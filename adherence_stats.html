    <!-- Medication Adherence Statistics -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="fas fa-chart-pie me-2"></i>Adherence Statistics</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <div class="adherence-chart-container">
                        <canvas id="adherenceDonutChart" height="220"></canvas>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card h-100 bg-light">
                        <div class="card-body">
                            <h5 class="card-title">Your Medication Adherence</h5>
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <span>Overall Adherence:</span>
                                <span class="badge bg-primary" id="overallAdherenceRate">Calculating...</span>
                            </div>
                            <div class="progress mb-4" style="height: 10px;">
                                <div class="progress-bar bg-primary" role="progressbar" id="adherenceProgressBar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                            </div>
                            <div class="stats-info">
                                <div class="d-flex justify-content-between small mb-2">
                                    <span>Doses taken on time:</span>
                                    <span id="dosesOnTime">-</span>
                                </div>
                                <div class="d-flex justify-content-between small mb-2">
                                    <span>Doses missed:</span>
                                    <span id="dosesMissed">-</span>
                                </div>
                                <div class="d-flex justify-content-between small">
                                    <span>Current streak:</span>
                                    <span id="currentStreak">-</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
